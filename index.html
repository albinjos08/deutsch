<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Deutsch-Lernportal</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --primary-color: #0d6efd;
            --success-color: #198754;
            --danger-color: #dc3545;
            --table-bg: #ffffff;
            --border-color: #dee2e6;
        }

        <body>

<div class="container">
    <h1 style="text-align: center; margin-bottom: 30px;">Mein Deutsch-Lernportal</h1>

    <div id="content-display-area"></div>

    <hr style="margin: 50px 0; border: 0; border-top: 1px dashed var(--border-color);">

    <div class="admin-panel">
        <div class="clearfix" style="margin-bottom: 20px;">
            <button class="btn-download" onclick="downloadJSON()">📥 Save Data Changes (Download JSON)</button>
            <h3 style="margin: 0; display: inline-block;">+ Add New Content</h3>
        </div>
        
        <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed var(--border-color);">
            <div class="form-group">
                <label for="new-heading-input">New Heading Name</label>
                <input type="text" id="new-heading-input" placeholder="e.g., Numbers">
            </div>
            <button class="btn-primary" onclick="addHeading()">Create Heading Section</button>
        </div>

        <div>
            <div class="form-group">
                <label for="heading-select">Select Heading</label>
                <select id="heading-select"><option value="">-- Choose Heading --</option></select>
            </div>
            <div class="form-group">
                <label for="deutsch-input">Deutsch</label>
                <input type="text" id="deutsch-input" placeholder="e.g., Danke">
            </div>
            <div class="form-group">
                <label for="english-input">English</label>
                <input type="text" id="english-input" placeholder="e.g., Thank you">
            </div>
            <div class="form-group">
                <label for="notes-input">Notes</label>
                <input type="text" id="notes-input" placeholder="Notes">
            </div>
            <button class="btn-success" onclick="addRow()">Add Phrase Row</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="clearfix" style="margin-bottom: 20px;">
        <button class="btn-download" onclick="downloadJSON()">📥 Save Data Changes (Download JSON)</button>
        <h1 style="margin: 0; text-align: left; display: inline-block;">Mein Deutsch-Lernportal</h1>
    </div>

    <div class="admin-panel">
        <h3 style="margin-top:0;">+ Add New Content</h3>
        
        <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed var(--border-color);">
            <div class="form-group">
                <label for="new-heading-input">New Heading Name</label>
                <input type="text" id="new-heading-input" placeholder="e.g., Numbers">
            </div>
            <button class="btn-primary" onclick="addHeading()">Create Heading Section</button>
        </div>

        <div>
            <div class="form-group">
                <label for="heading-select">Select Heading</label>
                <select id="heading-select"><option value="">-- Choose Heading --</option></select>
            </div>
            <div class="form-group">
                <label for="deutsch-input">Deutsch</label>
                <input type="text" id="deutsch-input" placeholder="e.g., Danke">
            </div>
            <div class="form-group">
                <label for="audio-input">Audio File Path</label>
                <input type="text" id="audio-input" placeholder="e.g., audio/danke.mp3">
            </div>
            <div class="form-group">
                <label for="english-input">English</label>
                <input type="text" id="english-input" placeholder="e.g., Thank you">
            </div>
            <div class="form-group">
                <label for="notes-input">Notes</label>
                <input type="text" id="notes-input" placeholder="Notes">
            </div>
            <button class="btn-success" onclick="addRow()">Add Phrase Row</button>
        </div>
    </div>

    <div id="content-display-area"></div>
</div>

<script>
    let vocabularyData = { headings: [], rows: [] };

    // Fetch the production database file from GitHub
// Fetch the production database file from GitHub (with cache busting)
    async function loadData() {
        try {
            // Adding a unique timestamp (?t=...) forces the browser to bypass the cache
            const response = await fetch('data.json?t=' + Date.now());
            if (!response.ok) throw new Error('Could not find data.json');
            vocabularyData = await response.json();
            renderWebsite();
        } catch (error) {
            console.error('Error reading configuration:', error);
            alert('Error loading data.json file. Make sure it is in the same repository folder.');
        }
    }

    function renderWebsite() {
        const displayArea = document.getElementById('content-display-area');
        const selectDropdown = document.getElementById('heading-select');
        
        displayArea.innerHTML = '';
        selectDropdown.innerHTML = '<option value="">-- Choose Heading --</option>';
        
        vocabularyData.headings.forEach(h => {
            selectDropdown.innerHTML += `<option value="${h}">${h}</option>`;
        });

        vocabularyData.headings.forEach(heading => {
            const currentRows = vocabularyData.rows.filter(r => r.heading === heading);
            
            let headingHTML = `<h2>${heading}</h2>`;
            let tableHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Deutsch</th>
                                <th>Audio</th>
                                <th>English</th>
                                <th>Notes</th>
                                <th style="text-align:center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            if (currentRows.length === 0) {
                tableHTML += `<tr><td colspan="5" style="text-align:center; color:#999;">Empty section.</td></tr>`;
            } else {
                currentRows.forEach(row => {
                    let audioPlayer = `<span style="color:#999; font-size:0.85rem;">No audio</span>`;
                    if (row.audio) {
                        audioPlayer = `<audio controls src="${row.audio}"></audio>`;
                    }
                    
                    tableHTML += `
                        <tr>
                            <td>${row.deutsch}</td>
                            <td>${audioPlayer}</td>
                            <td>${row.english}</td>
                            <td>${row.notes || '-'}</td>
                            <td style="text-align:center;">
                                <button class="btn-edit" onclick="editNotes(${row.id})">Edit</button>
                                <button class="btn-danger" onclick="deleteRow(${row.id})">Del</button>
                            </td>
                        </tr>
                    `;
                });
            }

            tableHTML += `</tbody></table></div>`;
            displayArea.innerHTML += headingHTML + tableHTML;
        });
    }

    function addHeading() {
        const input = document.getElementById('new-heading-input');
        const headingName = input.value.trim();
        if (!headingName) return alert('Enter a heading name.');
        if (vocabularyData.headings.includes(headingName)) return alert('Heading exists.');

        vocabularyData.headings.push(headingName);
        input.value = '';
        renderWebsite();
    }

    function addRow() {
        const heading = document.getElementById('heading-select').value;
        const deutsch = document.getElementById('deutsch-input').value.trim();
        const english = document.getElementById('english-input').value.trim();
        const notes = document.getElementById('notes-input').value.trim();

        if (!heading || !deutsch || !english) return alert('Heading, Deutsch, and English fields are mandatory.');

        // Automatically generates path based on the German word entered (e.g., audio/Danke.mp3)
        const autoAudioPath = `audio/${deutsch}.mp3`;

        vocabularyData.rows.push({
            id: Date.now(),
            heading: heading,
            deutsch: deutsch,
            english: english,
            notes: notes,
            audio: autoAudioPath
        });

        // Clear input boxes
        document.getElementById('deutsch-input').value = '';
        document.getElementById('english-input').value = '';
        document.getElementById('notes-input').value = '';
        renderWebsite();
    }

    function editNotes(id) {
        const row = vocabularyData.rows.find(r => r.id === id);
        const newNotes = prompt("Edit Notes:", row.notes);
        if (newNotes !== null) {
            row.notes = newNotes.trim();
            renderWebsite();
        }
    }

    function deleteRow(id) {
        if(confirm('Delete this row?')) {
            vocabularyData.rows = vocabularyData.rows.filter(row => row.id !== id);
            renderWebsite();
        }
    }

    // Exports modified configuration block to user downloads track
    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(vocabularyData, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "data.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    // Run Engine Initializer
    loadData();
</script>

</body>
</html>
